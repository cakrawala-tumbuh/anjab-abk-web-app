site_name: "ANJAB-ABK — Panduan Pengguna"
site_description: "Dokumentasi penggunaan aplikasi ANJAB & ABK untuk yayasan pendidikan — SOP dan Instruksi Kerja (IK)"
site_author: "Tim ANJAB-ABK"
site_url: "https://cakrawala-tumbuh.github.io/anjab-abk-web-app/"
repo_url: "https://github.com/cakrawala-tumbuh/anjab-abk-web-app"
repo_name: "cakrawala-tumbuh/anjab-abk-web-app"
edit_uri: edit/master/docs-usage/

docs_dir: docs-usage
site_dir: site-usage

theme:
  name: material
  language: id
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Ganti ke mode gelap
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Ganti ke mode terang
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

plugins:
  - search:
      lang: id
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cakrawala-tumbuh/anjab-abk-web-app

nav:
  - Beranda: index.md
  - Memulai:
    - Cara Memulai: memulai/index.md
  - SOP:
    - Daftar SOP: sop/index.md
    - "Persiapan: Task Inventory": sop/persiapan-task-inventory.md
    - "Persiapan: Time Study": sop/persiapan-time-study.md
    - "Persiapan: DCS": sop/persiapan-dcs.md
    - "Persiapan: WCP": sop/persiapan-wcp.md
    - "Pelaksanaan Pengambilan Data": sop/pelaksanaan-pengambilan-data.md
  - Instruksi Kerja (IK):
    - Daftar IK: ik/index.md
    - "IK-01 Login & Navigasi": ik/login-navigasi.md
    - "IK-02 Master Data": ik/master-data.md
    - "IK-03 Partisipan": ik/partisipan.md
    - "IK-04 Task Inventory": ik/task-inventory.md
    - "IK-05 Time Study": ik/time-study.md
    - "IK-06 DCS": ik/dcs.md
    - "IK-07 WCP": ik/wcp.md
  - Referensi:
    - FAQ: referensi/faq.md
