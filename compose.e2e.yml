# Stack E2E untuk pengujian manual — BUKAN produksi.
#
# Cara pakai:
#   make e2e-up        → generate secret + jalankan semua service
#   make e2e-down      → hentikan (volume tetap ada)
#   make e2e-reset     → hentikan + hapus volume + hapus .env.e2e
#   make e2e-logs      → ikuti log semua service
#
# URL setelah stack siap (port non-standar untuk menghindari konflik):
#   http://localhost:9100       → web app
#   http://localhost:9200/docs  → backend Swagger
#   http://localhost:9300       → Authentik admin UI
#
# Test users (dibuat otomatis oleh blueprint):
#   admin-e2e / AdminE2e123!   → grup admin
#   part-e2e  / PartE2e123!    → grup partisipan
#
# Secret (POSTGRES_PASSWORD, AUTHENTIK_SECRET_KEY, AUTH_SECRET) di-generate
# otomatis ke .env.e2e saat pertama kali make e2e-up dijalankan.
#
# Catatan jaringan:
#   Service infra (postgres, redis, authentik-*) dan backend berada di bridge
#   network "e2e". Service web menggunakan network_mode: host agar "localhost"
#   di dalam container = localhost host — diperlukan supaya Auth.js (server-side)
#   dan browser sama-sama menjangkau Authentik lewat http://localhost:9000.

services:
  # ── Infrastruktur Authentik ─────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e

  # ── Database backend anjab-abk (terpisah dari DB Authentik) ──────────────────
  # Sejak backend memakai persistensi PostgreSQL (v0.16.0+), service backend butuh
  # DATABASE_URL sendiri. DB ini disposable; init schema + seed dijalankan otomatis
  # oleh docker-entrypoint backend (alembic upgrade + seed).
  backend-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: anjab_abk
    volumes:
      - backend-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d anjab_abk"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e

  # ── Authentik ───────────────────────────────────────────────────────────────

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12
    restart: unless-stopped
    command: server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_LOG_LEVEL: info
    volumes:
      - authentik-media:/media
      - authentik-certs:/certs
    ports:
      - "9300:9000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9000/-/health/live/', timeout=3).status==200 else 1)"
      interval: 20s
      timeout: 5s
      start_period: 90s
      retries: 5
    networks:
      - e2e

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12
    restart: unless-stopped
    command: worker
    depends_on:
      authentik-server:
        condition: service_healthy
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik-media:/media
      - authentik-certs:/certs
      - ./e2e/blueprints:/blueprints/custom:ro
    networks:
      - e2e

  # ── Backend ─────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ../anjab-abk-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      authentik-server:
        condition: service_healthy
      backend-db:
        condition: service_healthy
    environment:
      LOG_LEVEL: INFO
      # Persistensi PostgreSQL (service backend-db). initdb (alembic + seed) berjalan
      # otomatis lewat docker-entrypoint sebelum app naik.
      DATABASE_URL: postgresql+psycopg://app:${POSTGRES_PASSWORD}@backend-db:5432/anjab_abk
      CORS_ORIGINS: '["http://localhost:9100","http://${HOST_IP:-localhost}:9100"]'
      CORS_ALLOW_CREDENTIALS: "true"
      # Issuer harus cocok dengan klaim `iss` di JWT yang diterbitkan Authentik (URL publik)
      AUTHENTIK_ISSUER: http://${HOST_IP:-localhost}:9300/application/o/anjab-abk-e2e/
      # JWKS URI: gunakan URL internal (service name) agar backend bisa fetch kunci dari network bridge
      AUTHENTIK_JWKS_URI: http://authentik-server:9000/application/o/anjab-abk-e2e/jwks/
      # URL di bawah ini untuk Swagger UI (browser), pakai port host
      OAUTH2_AUTHORIZATION_URL: http://${HOST_IP:-localhost}:9300/application/o/authorize/
      OAUTH2_TOKEN_URL: http://${HOST_IP:-localhost}:9300/application/o/token/
      OAUTH2_CLIENT_ID: anjab-abk-e2e
      OAUTH2_SCOPES: "openid profile email"
    ports:
      - "9200:8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).status==200 else 1)"
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - e2e

  # ── Web App ─────────────────────────────────────────────────────────────────
  # network_mode: host — container berbagi namespace jaringan host.
  # Efek: "localhost" di dalam container identik dengan "localhost" di browser,
  # sehingga Auth.js (server-side OIDC discovery) dan browser (redirect login)
  # sama-sama menjangkau Authentik di http://localhost:9300.
  # PORT=9100 — Next.js mendengarkan di port non-standar.

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Harus di-pass saat build — NEXT_PUBLIC_* di-embed statis oleh Next.js
        NEXT_PUBLIC_API_BASE_URL: http://${HOST_IP:-localhost}:9200
    restart: unless-stopped
    network_mode: host
    depends_on:
      authentik-server:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      PORT: "9100"
      # Backend — browser memanggil lewat HOST_IP (LAN / Tailscale)
      NEXT_PUBLIC_API_BASE_URL: http://${HOST_IP:-localhost}:9200
      # Backend — server side (Next.js SSR) memanggil lewat localhost karena network_mode: host
      # Tanpa ini, server side jatuh ke NEXT_PUBLIC_API_BASE_URL yang di-embed saat build (bisa basi)
      API_BASE_URL_INTERNAL: http://localhost:9200
      # Authentik OIDC — HOST_IP:9300 dijangkau dari browser mana pun (LAN / Tailscale)
      AUTHENTIK_ISSUER: http://${HOST_IP:-localhost}:9300/application/o/anjab-abk-e2e/
      AUTHENTIK_CLIENT_ID: anjab-abk-e2e
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_DEBUG: "true"
      # AUTH_URL harus cocok dengan URL yang dipakai browser (LAN atau Tailscale IP).
      # Di-set otomatis dari HOST_IP yang dideteksi saat make e2e-up.
      AUTH_URL: http://${HOST_IP:-localhost}:9100

volumes:
  postgres-data:
  backend-db-data:
  authentik-media:
  authentik-certs:

networks:
  e2e:
    driver: bridge
