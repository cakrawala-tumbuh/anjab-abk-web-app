name: Deploy Docs Pengguna ke GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Jalankan untuk tag v* (push) atau dispatch manual.
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pastikan tag yang dideploy memang berasal dari riwayat master.
      # Pada workflow_dispatch (ref = master) langkah ini otomatis terpenuhi.
      - name: Verifikasi tag berasal dari master
        if: github.ref_type == 'tag'
        run: |
          git fetch origin master --depth=100
          if git merge-base --is-ancestor "${{ github.sha }}" origin/master; then
            echo "Tag berada di riwayat master — lanjut deploy."
          else
            echo "::error::Tag tidak berada di riwayat master — deploy dibatalkan."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build -f mkdocs-usage.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-usage

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
