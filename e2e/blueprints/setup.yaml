# Blueprint Authentik — auto-apply saat stack E2E pertama kali dijalankan.
# Menggunakan state: present sehingga idempoten (aman dijalankan ulang).
# Reset total: make e2e-reset (hapus volume + .env.e2e).

version: 1
metadata:
  name: anjab-abk E2E Setup
  labels:
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # ── Grup ─────────────────────────────────────────────────────────────────────

  - model: authentik_core.group
    state: present
    identifiers:
      name: admin
    attrs:
      name: admin

  - model: authentik_core.group
    state: present
    identifiers:
      name: partisipan
    attrs:
      name: partisipan

  # ── Pengguna uji ─────────────────────────────────────────────────────────────

  - model: authentik_core.user
    state: present
    identifiers:
      username: admin-e2e
    attrs:
      username: admin-e2e
      name: Admin E2E
      email: admin@e2e.local
      is_active: true
      password: AdminE2e123!
      groups:
        - !Find [authentik_core.group, [name, admin]]

  - model: authentik_core.user
    state: present
    identifiers:
      username: part-e2e
    attrs:
      username: part-e2e
      name: Partisipan E2E
      email: partisipan@e2e.local
      is_active: true
      password: PartE2e123!
      groups:
        - !Find [authentik_core.group, [name, partisipan]]

  # ── OAuth2/OIDC Provider ─────────────────────────────────────────────────────
  # Authentik 2024.x: redirect_uris adalah list of {matching_mode, url}.
  # authorization_flow wajib diisi.

  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: anjab-abk-e2e
    attrs:
      name: anjab-abk-e2e
      client_id: anjab-abk-e2e
      client_type: public
      redirect_uris:
        - matching_mode: regex
          url: "http://(localhost|\\d+\\.\\d+\\.\\d+\\.\\d+):9100/api/auth/callback/authentik"
        - matching_mode: regex
          url: "http://(localhost|\\d+\\.\\d+\\.\\d+\\.\\d+):9200/docs/oauth2-redirect"
      authorization_flow: !Find
        - authentik_flows.flow
        - [slug, default-provider-authorization-implicit-consent]
      invalidation_flow: !Find
        - authentik_flows.flow
        - [slug, default-provider-invalidation-flow]
      issuer_mode: per_provider
      sub_mode: hashed_user_id
      access_code_validity: "minutes=1"
      access_token_validity: "minutes=5"
      refresh_token_validity: "days=30"
      signing_key: !Find
        - authentik_crypto.certificatekeypair
        - [name, "authentik Self-signed Certificate"]
      property_mappings:
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, "goauthentik.io/providers/oauth2/scope-openid"]
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, "goauthentik.io/providers/oauth2/scope-email"]
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, "goauthentik.io/providers/oauth2/scope-profile"]

  # ── Aplikasi ─────────────────────────────────────────────────────────────────

  - model: authentik_core.application
    state: present
    identifiers:
      slug: anjab-abk-e2e
    attrs:
      name: anjab-abk E2E
      slug: anjab-abk-e2e
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, anjab-abk-e2e]]
