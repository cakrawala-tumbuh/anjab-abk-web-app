<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1d4ed8"/>

  <!-- Top node (jabatan pusat) -->
  <rect x="188" y="72" width="136" height="80" rx="14" fill="white"/>

  <!-- Vertical connector dari top ke horizontal -->
  <rect x="248" y="152" width="16" height="44" fill="rgba(255,255,255,0.55)"/>

  <!-- Horizontal bar -->
  <rect x="112" y="192" width="288" height="14" fill="rgba(255,255,255,0.55)"/>

  <!-- Left vertical connector -->
  <rect x="112" y="192" width="14" height="46" fill="rgba(255,255,255,0.55)"/>

  <!-- Center vertical connector -->
  <rect x="248" y="192" width="16" height="46" fill="rgba(255,255,255,0.55)"/>

  <!-- Right vertical connector -->
  <rect x="386" y="192" width="14" height="46" fill="rgba(255,255,255,0.55)"/>

  <!-- Bottom left node -->
  <rect x="56" y="238" width="126" height="72" rx="12" fill="white"/>

  <!-- Bottom center node -->
  <rect x="193" y="238" width="126" height="72" rx="12" fill="white"/>

  <!-- Bottom right node -->
  <rect x="330" y="238" width="126" height="72" rx="12" fill="white"/>

  <!-- Bar chart (ABK / beban kerja) -->
  <rect x="112" y="358" width="28" height="86" rx="6" fill="rgba(255,255,255,0.35)"/>
  <rect x="148" y="338" width="28" height="106" rx="6" fill="rgba(255,255,255,0.50)"/>
  <rect x="184" y="316" width="28" height="128" rx="6" fill="rgba(255,255,255,0.70)"/>
  <rect x="220" y="330" width="28" height="114" rx="6" fill="rgba(255,255,255,0.60)"/>
  <rect x="256" y="308" width="28" height="136" rx="6" fill="rgba(255,255,255,0.80)"/>
  <rect x="292" y="322" width="28" height="122" rx="6" fill="rgba(255,255,255,0.65)"/>
  <rect x="328" y="344" width="28" height="100" rx="6" fill="rgba(255,255,255,0.50)"/>
  <rect x="364" y="364" width="28" height="80" rx="6" fill="rgba(255,255,255,0.38)"/>

  <!-- Baseline for bar chart -->
  <rect x="100" y="442" width="312" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
